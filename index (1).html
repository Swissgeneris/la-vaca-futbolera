// ── Avatar ─────────────────────────────────────────────────────────────────
function Avatar({mama,size=36,idx=0,editable=false,onUpload}){
  const ref=useRef();
  const fs=size<28?'9px':size<36?'11px':'13px';
  function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=200,r=Math.min(MAX/img.width,MAX/img.height,1);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*r);c.height=Math.round(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);onUpload&&onUpload(c.toDataURL('image/jpeg',0.7));
    };img.src=url;
  }
  return React.createElement('div',{style:{position:'relative',width:size,height:size,flexShrink:0}},
    React.createElement('div',{className:'avatar-ring',style:{width:size,height:size,background:mama.foto?'transparent':COLORS[idx%COLORS.length],fontSize:fs,color:'#fff',fontWeight:600,cursor:editable?'pointer':'default',border:editable?'2px dashed rgba(139,26,26,0.35)':'none'},onClick:editable?()=>ref.current.click():undefined},
      mama.foto
        ?React.createElement('img',{src:mama.foto,alt:mama.nombre,style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}})
        :initials(mama.nombre)
    ),
    editable&&React.createElement('div',{style:{position:'absolute',bottom:-1,right:-1,width:Math.max(16,size*.38),height:Math.max(16,size*.38),borderRadius:'50%',background:'#8B1A1A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:Math.max(9,size*.22),color:'#fff',border:'2px solid #fff',pointerEvents:'none'}},'📷'),
    editable&&React.createElement('input',{type:'file',accept:'image/*',ref,style:{display:'none'},onChange:handleFile})
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const[state,setState]=useState(()=>{
    try{const s=localStorage.getItem('lavaca_v3');return s?JSON.parse(s):null;}catch{return null;}
  });
  const[usuario,setUsuario]=useState(null);
  const[view,setView]=useState('home');
  const data=state||{mamas:SEED_MAMAS,gastos:[],pagos:[]};
  const safeData={...data,pagos:data.pagos||[]};
  useEffect(()=>{try{localStorage.setItem('lavaca_v3',JSON.stringify(safeData));}catch{};},[state]);
  function save(d){setState({...d,pagos:d.pagos||[]});}
  function login(m){setUsuario(m);setView('home');}
  function logout(){setUsuario(null);setView('home');}
  function updateFoto(id,foto){
    save({...safeData,mamas:safeData.mamas.map(m=>m.id===id?{...m,foto}:m)});
    if(usuario?.id===id)setUsuario(u=>({...u,foto}));
  }
  if(!usuario)return React.createElement(Login,{mamas:safeData.mamas,onLogin:login});
  return React.createElement(Main,{data:safeData,usuario,onSave:save,onLogout:logout,view,setView,onUpdateFoto:updateFoto});
}

// ── Login ──────────────────────────────────────────────────────────────────
function Login({mamas,onLogin}){

  const[pin,setPin]=useState('');

  function go(){
    const m=mamas.find(m=>m.id===selId&&m.pin===pin);
    if(m)onLogin(m);else setErr('PIN incorrecto. Pídele a Coni 🙋‍♀️');

  return React.createElement('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',background:'#f5f5f0'}},
    React.createElement('div',{style:{width:'100%',maxWidth:'360px'}},

            ...mamas.map(m=>React.createElement('option',{key:m.id,value:m.id},m.nombre+(m.capitana?' ⚽':'')))

        ),
        sel&&React.createElement('div',{style:{display:'flex',justifyContent:'center',padding:'4px 0'}},

        React.createElement('div',null,

          React.createElement('input',{type:'password',maxLength:4,value:pin,onChange:e=>setPin(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),placeholder:'••••'})
        ),
        err&&React.createElement('p',{style:{color:'#dc2626',fontSize:'13px'}},err),
        React.createElement('button',{className:'btn btn-primary',style:{width:'100%'},onClick:go},'Entrar')

      React.createElement('p',{style:{textAlign:'center',fontSize:'12px',color:'#6b6b68',marginTop:'10px'}},'¿No tienes PIN? Escríbele a Coni ⚽')
    )
  );
}

// ── calcBalances ───────────────────────────────────────────────────────────
function calcBalances(data){
  const b={};data.mamas.forEach(m=>{b[m.id]=0;});
  data.gastos.forEach(g=>{
    if(g.montosPorMama){
      Object.entries(g.montosPorMama).forEach(([id,monto])=>{
        if(id===g.pagadoPor)b[id]=(b[id]||0)+(g.monto-monto);
        else b[id]=(b[id]||0)-monto;
      });
    } else {
      const p=g.participantes||data.mamas.map(m=>m.id);
      const s=g.monto/p.length;
      b[g.pagadoPor]=(b[g.pagadoPor]||0)+(g.monto-s);
      p.forEach(pid=>{if(pid!==g.pagadoPor)b[pid]=(b[pid]||0)-s;});
    }
  });
  (data.pagos||[]).forEach(p=>{
    b[p.deId]=(b[p.deId]||0)+p.monto;
    b[p.aId]=(b[p.aId]||0)-p.monto;
  });
  return b;
}

// ── Balances ───────────────────────────────────────────────────────────────
function Balances({data,usuario,onSave}){
  const esAdmin=usuario.tesorera;
  const b=calcBalances(data);
  const deudas=[];
  const bCopy={};Object.entries(b).forEach(([k,v])=>bCopy[k]=v);
  const pp=Object.entries(bCopy).filter(([,v])=>v>0.5).map(([id,v])=>[id,v]).sort((a,c)=>c[1]-a[1]);
  const nn=Object.entries(bCopy).filter(([,v])=>v<-0.5).map(([id,v])=>[id,v]).sort((a,c)=>a[1]-c[1]);
  let pi=0,ni=0;
  while(pi<pp.length&&ni<nn.length){
    const amt=Math.min(pp[pi][1],-nn[ni][1]);
    if(amt>1)deudas.push({de:nn[ni][0],a:pp[pi][0],monto:amt});
    pp[pi][1]-=amt;nn[ni][1]+=amt;
    if(pp[pi][1]<1)pi++;if(nn[ni][1]>-1)ni++;
  }
  function marcarPagado(deId,aId,monto){
    const pago={id:'p'+Date.now(),deId,aId,monto:Math.round(monto),fecha:new Date().toISOString().slice(0,10)};
    onSave({...data,pagos:[...(data.pagos||[]),pago]});
  }
  function deshacerPago(id){
    onSave({...data,pagos:(data.pagos||[]).filter(p=>p.id!==id)});
  }
  const historialPagos=(data.pagos||[]).slice().reverse();
  return React.createElement('div',{className:'col'},
    React.createElement('h2',{style:{fontSize:'17px',fontWeight:500}},'Saldos del equipo'),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},
      ...data.mamas.map((m,i)=>{
        const s=b[m.id]||0,isMe=m.id===usuario.id;
        return React.createElement('div',{key:m.id,className:'card row space-between',style:{padding:'10px 14px',border:isMe?'1.5px solid #8B1A1A':''}},
          React.createElement('div',{className:'row',style:{gap:'10px'}},
            React.createElement(Avatar,{mama:m,size:36,idx:i}),
            React.createElement('div',{className:'col',style:{gap:'1px'}},
              React.createElement('span',{style:{fontSize:'14px',fontWeight:500}},m.nombre+(isMe?' (tú)':'')+(m.capitana?' ⚽':'')+(m.tesorera?' 💰':'')),
              React.createElement('span',{style:{fontSize:'11px',color:'#6b6b68'}},s>0.5?'Ha puesto de más':s<-0.5?'Debe':'Al día ✓')
            )
          ),
          React.createElement('span',{style:{fontWeight:600,fontSize:'15px',color:s>0.5?'#059669':s<-0.5?'#dc2626':'#6b6b68'}},
            s>0.5?'+'+fmtCLP(s):s<-0.5?fmtCLP(s):'✓')
        );
      })
    ),
    React.createElement('div',{className:'divider'}),
    React.createElement('h3',{style:{fontSize:'15px',fontWeight:500,marginBottom:'8px'}},'Transferencias pendientes 💸'),
    deudas.length===0
      ?React.createElement('div',{className:'empty-state',style:{padding:'1rem'}},data.gastos.length>0?'✅ ¡Todas al día!':'Sin gastos aún')
      :React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
        ...deudas.map((d,i)=>{
          const de=data.mamas.find(m=>m.id===d.de),a=data.mamas.find(m=>m.id===d.a);
          const esYo=d.de===usuario.id;
          const ide=data.mamas.findIndex(m=>m.id===d.de),ia=data.mamas.findIndex(m=>m.id===d.a);
          return React.createElement('div',{key:i,className:'card',style:{background:esYo?'#FFF5F5':'',border:esYo?'1px solid #FCA5A5':'',padding:'12px 14px'}},
            React.createElement('div',{className:'row space-between',style:{flexWrap:'wrap',gap:'8px'}},
              React.createElement('div',{className:'row',style:{gap:'8px',flexWrap:'wrap'}},
                React.createElement(Avatar,{mama:de||{nombre:'?',foto:null},size:32,idx:ide}),
                React.createElement('div',{className:'col',style:{gap:'1px'}},
                  React.createElement('span',{style:{fontSize:'13px',fontWeight:600}},de?.nombre+(esYo?' (tú)':'')),
                  React.createElement('span',{style:{fontSize:'11px',color:'#6b6b68'}},'debe transferir a')
                ),
                React.createElement('span',{style:{fontSize:'18px',color:'#6b6b68'}},'→'),
                React.createElement(Avatar,{mama:a||{nombre:'?',foto:null},size:32,idx:ia}),
                React.createElement('span',{style:{fontSize:'13px',fontWeight:600}},a?.nombre)
              ),
              React.createElement('div',{className:'col',style:{alignItems:'flex-end',gap:'6px'}},
                React.createElement('span',{style:{fontWeight:700,color:'#dc2626',fontSize:'16px'}},fmtCLP(Math.round(d.monto))),
                esAdmin&&React.createElement('button',{className:'btn btn-success btn-sm',onClick:()=>marcarPagado(d.de,d.a,d.monto)},'✓ Marcar pagado')
              )
            ),
            esYo&&React.createElement('p',{style:{fontSize:'12px',color:'#8B1A1A',marginTop:'6px'}},'👈 ¡Esta eres tú!')
          );
        })
      ),
    historialPagos.length>0&&React.createElement('div',null,
      React.createElement('div',{className:'divider'}),
      React.createElement('h3',{style:{fontSize:'15px',fontWeight:500,marginBottom:'8px'}},'Pagos confirmados ✅'),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},
        ...historialPagos.map(p=>{
          const de=data.mamas.find(m=>m.id===p.deId),a=data.mamas.find(m=>m.id===p.aId);
          const ide=data.mamas.findIndex(m=>m.id===p.deId),ia=data.mamas.findIndex(m=>m.id===p.aId);
          return React.createElement('div',{key:p.id,className:'pagado-banner',style:{justifyContent:'space-between',flexWrap:'wrap',gap:'6px'}},

              React.createElement(Avatar,{mama:de||{nombre:'?',foto:null},size:24,idx:ide}),
              React.createElement('span',{style:{fontSize:'13px'}},de?.nombre),
              React.createElement('span',{style:{color:'#047857'}},'→'),
              React.createElement(Avatar,{mama:a||{nombre:'?',foto:null},size:24,idx:ia}),
              React.createElement('span',{style:{fontSize:'13px'}},a?.nombre),
              React.createElement('span',{style:{fontWeight:600}},fmtCLP(p.monto)),
              React.createElement('span',{style:{fontSize:'11px',color:'#6EE7B7'}},fmtDate(p.fecha))
            ),
            esAdmin&&React.createElement('button',{className:'btn btn-sm btn-danger',style:{fontSize:'11px'},onClick:()=>deshacerPago(p.id)},'Deshacer')
          );
        })
      )
    )
  );
}

function Gastos({data,usuario,onSave}){
  const blank=()=>({desc:'',monto:'',fecha:new Date().toISOString().slice(0,10),pagadoPor:usuario.id,modo:'igual',sel:data.mamas.map(m=>m.id),montos:{}});
  const[show,setShow]=useState(false);
  const[f,setF]=useState(blank());
  const[err,setErr]=useState('');
  const[detalleId,setDetalleId]=useState(null);
  function upd(k,v){setF(prev=>({...prev,[k]:v}));}
  const sumaCustom=Object.values(f.montos).reduce((a,v)=>a+(Number(v)||0),0);
  const totalNum=Number(f.monto)||0;
  const diff=Math.abs(totalNum-sumaCustom);
  const ok=diff<1;
  function toggleMama(id){
    const ns=f.sel.includes(id)?f.sel.filter(x=>x!==id):[...f.sel,id];
    const nm={...f.montos};if(!ns.includes(id))delete nm[id];
    setF(prev=>({...prev,sel:ns,montos:nm}));
  }
  function setMontoMama(id,val){setF(prev=>({...prev,montos:{...prev.montos,[id]:val}}));}
  function distribuirResto(){
    if(!totalNum)return;
    const n=f.sel.length;if(n===0)return;
    const share=Math.round(totalNum/n);
    const nm={};f.sel.forEach((id,i)=>nm[id]=i<n-1?share:totalNum-share*(n-1));
    setF(prev=>({...prev,montos:nm}));
  }
  function agregar(){
    if(!f.desc.trim()||!f.monto||isNaN(totalNum)||totalNum<=0){setErr('Completa descripción y monto total.');return;}
    if(f.sel.length===0){setErr('Selecciona al menos una participante.');return;}
    if(f.modo==='custom'&&!ok){setErr('La suma ('+fmtCLP(sumaCustom)+') no coincide con el total ('+fmtCLP(totalNum)+').');return;}
    const g={id:'g'+Date.now(),descripcion:f.desc.trim(),monto:totalNum,fecha:f.fecha,pagadoPor:f.pagadoPor,participantes:f.sel,montosPorMama:f.modo==='custom'?Object.fromEntries(f.sel.map(id=>[id,Number(f.montos[id])||0])):null};
    onSave({...data,gastos:[...data.gastos,g]});
    setF(blank());setErr('');setShow(false);
  }
  function eliminar(id){
    if(!usuario.tesorera){alert('Solo la tesorera puede eliminar gastos.');return;}

      React.createElement('div',null,React.createElement('label',null,'Fecha'),React.createElement('input',{type:'date',value:f.fecha,onChange:e=>upd('fecha',e.target.value)})),
      React.createElement('div',null,React.createElement('label',null,'¿Quién pagó?'),
        React.createElement('select',{value:f.pagadoPor,onChange:e=>upd('pagadoPor',e.target.value)},
          ...data.mamas.map(m=>React.createElement('option',{key:m.id,value:m.id},m.nombre))
        )
      ),
      React.createElement('div',null,
        React.createElement('label',null,'¿Cómo se divide?'),
        React.createElement('div',{className:'toggle-row'},
          React.createElement('button',{className:'toggle-opt'+(f.modo==='igual'?' active':''),onClick:()=>upd('modo','igual')},'⚖️ Partes iguales'),
          React.createElement('button',{className:'toggle-opt'+(f.modo==='custom'?' active':''),onClick:()=>upd('modo','custom')},'✏️ Montos personalizados')
        )
      ),
      f.modo==='igual'&&React.createElement('div',null,
        React.createElement('div',{className:'row space-between',style:{marginBottom:'8px'}},
          React.createElement('label',{style:{margin:0}},'¿Quiénes participaron?'),
          React.createElement('button',{className:'btn btn-sm',style:{fontSize:'11px'},onClick:()=>setF(p=>({...p,sel:p.sel.length===data.mamas.length?[]:data.mamas.map(m=>m.id)}))},f.sel.length===data.mamas.length?'Ninguna':'Todas')
        ),
        React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
          ...data.mamas.map((m,i)=>{
            const on=f.sel.includes(m.id);
            return React.createElement('div',{key:m.id,onClick:()=>toggleMama(m.id),style:{display:'flex',alignItems:'center',gap:'5px',padding:'4px 10px',borderRadius:'20px',cursor:'pointer',fontSize:'13px',border:'0.5px solid '+(on?'#8B1A1A':'#d0cfc8'),background:on?'#F5E6E6':'transparent',color:on?'#8B1A1A':'#6b6b68'}},
              React.createElement(Avatar,{mama:m,size:20,idx:i}),m.nombre
            );
          })
        ),
        f.sel.length>0&&totalNum>0&&React.createElement('p',{style:{fontSize:'12px',color:'#6b6b68',marginTop:'4px'}},'→ '+fmtCLP(Math.round(totalNum/f.sel.length))+' por mamá ('+f.sel.length+' participantes)')
      ),
      f.modo==='custom'&&React.createElement('div',{className:'col',style:{gap:'8px'}},
        React.createElement('div',{className:'row space-between'},
          React.createElement('label',{style:{margin:0}},'Monto por mamá'),
          React.createElement('button',{className:'btn btn-sm',style:{fontSize:'11px'},onClick:distribuirResto},'Distribuir igualmente')
        ),
        React.createElement('div',{style:{border:'0.5px solid #e8e7e0',borderRadius:8,padding:'6px 10px'}},
          ...data.mamas.map((m,i)=>{

              React.createElement(Avatar,{mama:m,size:24,idx:i}),
              React.createElement('span',{style:{flex:1,fontSize:'13px',fontWeight:on?500:400,color:on?'#1a1a18':'#6b6b68'}},m.nombre),
              on&&React.createElement('input',{className:'monto-input',type:'number',placeholder:'$0',value:f.montos[m.id]||'',onChange:e=>setMontoMama(m.id,e.target.value)})
            );

        ),
        totalNum>0&&React.createElement('div',{className:ok?'ok-bar':'warning-bar'},
          ok?'✅ Suma correcta: '+fmtCLP(sumaCustom)+' = '+fmtCLP(totalNum)
            :'⚠️ Suma: '+fmtCLP(sumaCustom)+' / Total: '+fmtCLP(totalNum)+(sumaCustom<totalNum?' (faltan '+fmtCLP(diff)+')':' (sobran '+fmtCLP(diff)+')')
        )
      ),
      err&&React.createElement('p',{style:{color:'#dc2626',fontSize:'13px'}},err),
      React.createElement('button',{className:'btn btn-primary',onClick:agregar},'Guardar gasto')
    ),
    data.gastos.length===0?React.createElement('div',{className:'empty-state'},'Sin gastos aún 🙈'):
    React.createElement('div',{className:'scroll-list'},
      ...data.gastos.slice().reverse().map(g=>{

                React.createElement('span',{style:{fontSize:'11px',color:'#6b6b68'}},fmtDate(g.fecha)+' · '+pg?.nombre+' · '+(isCustom?'montos personalizados':n+' mamás · '+fmtCLP(g.monto/n)+' c/u'))

        return React.createElement('div',{key:m.id,style:{display:'flex',alignItems:'center',gap:'6px',padding:'7px 0',borderBottom:'0.5px solid #e8e7e0',flexWrap:'wrap'}},
          React.createElement(Avatar,{mama:m,size:28,idx:i}),
          React.createElement('span',{style:{fontSize:'13px',fontWeight:500,flex:1,minWidth:'50px'}},m.nombre+(m.capitana?' ⚽':'')+(m.tesorera?' 💰':'')),
          React.createElement('span',{style:{fontSize:'11px',color:'#6b6b68'}},'PIN: '+m.pin),
          React.createElement('input',{type:'text',maxLength:4,placeholder:'nuevo PIN',value:ep,onChange:e=>setEp(e.target.value),style:{width:'72px',padding:'3px 6px',fontSize:'12px'}}),
          React.createElement('button',{className:'btn btn-sm',style:{fontSize:'11px'},onClick:()=>{resetPin(m.id,ep);setEp('');}},'+PIN'),
          !m.tesorera&&React.createElement('button',{className:'btn btn-sm',style:{fontSize:'11px'},onClick:()=>cambiarTesorera(m.id)},'💰 Teso'),
          !m.tesorera&&!m.capitana&&React.createElement('button',{className:'btn btn-sm btn-danger',onClick:()=>eliminar(m.id)},'✕')
        );
      })
    )
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
